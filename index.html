<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Problem Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Print styles to ensure the worksheet looks clean when printed or saved as PDF */
        @media print {
            body {
                background-color: white !important;
                background-image: none !important;
            }
            .no-print {
                display: none !important;
            }
            .print-break-inside-avoid {
                break-inside: avoid;
            }
            #problems-container {
                gap: 4rem !important;
                margin-top: 2rem;
            }
            .problem-card {
                background-color: white !important;
                border: 2px solid #cbd5e1 !important; /* light slate */
                color: black !important;
                box-shadow: none !important;
                transform: none !important;
                border-radius: 1rem !important;
            }
            .problem-card .border-current {
                border-color: black !important;
            }
        }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-100 via-purple-100 to-pink-100 min-h-screen font-sans text-slate-800 p-4 md:p-8 pb-24">

    <!-- Modal for Settings (Shows on load) -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300">
        <div class="bg-white p-6 md:p-10 rounded-[2rem] shadow-2xl border-4 border-white w-full max-w-3xl transform transition-transform duration-300 scale-100">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-extrabold flex items-center gap-3">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 pb-1">
                        Mattegenerator
                    </span>
                </h1>
                <button onclick="closeSettings()" class="bg-slate-100 p-2 rounded-full text-slate-400 hover:text-pink-500 hover:bg-pink-50 transition-all transform hover:rotate-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Operations -->
                <div class="bg-purple-50 p-5 rounded-2xl border border-purple-100">
                    <h3 class="font-bold text-purple-900 mb-3 text-lg">Räknesätt</h3>
                    <div class="flex flex-col gap-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="op-add" class="w-6 h-6 rounded border-purple-300 text-purple-600 focus:ring-purple-500 transition-transform group-hover:scale-110" checked>
                            <span class="text-purple-800 font-medium">Addition (+)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="op-sub" class="w-6 h-6 rounded border-purple-300 text-purple-600 focus:ring-purple-500 transition-transform group-hover:scale-110" checked>
                            <span class="text-purple-800 font-medium">Subtraktion (-)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="op-mul" class="w-6 h-6 rounded border-purple-300 text-purple-600 focus:ring-purple-500 transition-transform group-hover:scale-110" checked>
                            <span class="text-purple-800 font-medium">Multiplikation (×)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="op-div" class="w-6 h-6 rounded border-purple-300 text-purple-600 focus:ring-purple-500 transition-transform group-hover:scale-110" checked>
                            <span class="text-purple-800 font-medium">Division (÷)</span>
                        </label>
                    </div>
                </div>

                <!-- Digits -->
                <div class="bg-pink-50 p-5 rounded-2xl border border-pink-100">
                    <h3 class="font-bold text-pink-900 mb-3 text-lg">Antal siffror</h3>
                    <select id="digits" class="w-full p-3 border-2 border-pink-200 rounded-xl focus:ring-4 focus:ring-pink-200 focus:border-pink-500 outline-none transition-all font-medium text-pink-900 bg-white cursor-pointer mb-4">
                        <option value="1">1 Siffra (1-9)</option>
                        <option value="2" selected>2 Siffror (10-99)</option>
                        <option value="3">3 Siffror (100-999)</option>
                        <option value="4">4 Siffror (1000-9999)</option>
                    </select>
                    
                    <div class="pt-3 border-t-2 border-pink-100">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="use-decimals" class="w-5 h-5 rounded border-pink-300 text-pink-600 focus:ring-pink-500 transition-transform group-hover:scale-110">
                            <span class="text-pink-800 font-medium">Med decimaler (tiondelar)</span>
                        </label>
                    </div>

                    <p class="text-xs text-pink-600/80 mt-3 font-medium leading-relaxed">
                        *Multiplikation & division använder alltid en 1-siffrig nämnare.
                    </p>
                </div>

                <!-- Quantity -->
                <div class="bg-orange-50 p-5 rounded-2xl border border-orange-100">
                    <h3 class="font-bold text-orange-900 mb-3 text-lg">Hur många?</h3>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-3">
                            <input type="number" id="count" min="1" max="20" value="20" class="w-24 p-3 border-2 border-orange-200 rounded-xl text-center text-xl font-bold text-orange-900 focus:ring-4 focus:ring-orange-200 focus:border-orange-500 outline-none transition-all bg-white">
                            <span class="text-orange-700 font-medium">uppgifter</span>
                        </div>
                        <span class="text-xs text-orange-600/80 font-medium mt-1">Maximalt 20 stycken</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-10 flex gap-4">
                <button onclick="generateProblems(true)" class="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold text-xl py-4 px-6 rounded-2xl shadow-lg shadow-pink-200 transform transition-all hover:-translate-y-1 active:translate-y-0 flex justify-center items-center gap-3">
                    Skapa roliga uppgifter!
                </button>
            </div>
        </div>
    </div>

    <!-- Toolbar hidden in the corner -->
    <div id="corner-toolbar" class="no-print fixed bottom-6 right-6 z-40 flex items-center gap-3 bg-white p-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-2 border-purple-100 transition-all duration-300">
        <button onclick="openSettings()" class="flex items-center gap-2 px-5 py-3 rounded-full bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold transition-all transform hover:scale-105" title="Inställningar">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span class="hidden sm:inline">Ändra</span>
        </button>
        <button onclick="generateProblems(false)" class="p-3 rounded-full bg-pink-50 hover:bg-pink-100 text-pink-600 transition-all transform hover:scale-110 hover:rotate-180 duration-500" title="Blanda nya uppgifter">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
        </button>
        <button onclick="window.print()" class="p-3 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 transition-all transform hover:scale-110" title="Skriv ut / Spara PDF">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
        </button>
    </div>

    <div class="max-w-6xl mx-auto mt-4">
        <!-- Problems Output Grid -->
        <div id="problems-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
            <!-- Problems will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        // Modal toggles
        function openSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        // Helper to get a random integer between min and max (inclusive)
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateProblems(closeModal = false) {
            // 1. Gather selected operations
            const ops = [];
            if (document.getElementById('op-add').checked) ops.push('+');
            if (document.getElementById('op-sub').checked) ops.push('-');
            if (document.getElementById('op-mul').checked) ops.push('*');
            if (document.getElementById('op-div').checked) ops.push('/');

            if (ops.length === 0) {
                alert("Vänligen välj minst ett räknesätt.");
                return;
            }

            // 2. Gather digit and count settings
            const digits = parseInt(document.getElementById('digits').value);
            let count = parseInt(document.getElementById('count').value);
            const useDecimals = document.getElementById('use-decimals').checked;
            
            // Enforce max 20 limit
            if (count > 20) {
                count = 20;
                document.getElementById('count').value = 20;
            }
            if (count < 1) {
                count = 1;
                document.getElementById('count').value = 1;
            }

            const container = document.getElementById('problems-container');
            container.innerHTML = ''; // Clear previous

            // Base ranges for standard numbers based on digit selection
            const minBase = Math.pow(10, digits - 1); // e.g., 2 digits -> 10
            const maxBase = Math.pow(10, digits) - 1; // e.g., 2 digits -> 99

            // Colour themes for the problem cards
            const cardColors = [
                { bg: 'bg-pink-100', border: 'border-pink-300', text: 'text-pink-900' },
                { bg: 'bg-purple-100', border: 'border-purple-300', text: 'text-purple-900' },
                { bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-900' },
                { bg: 'bg-emerald-100', border: 'border-emerald-300', text: 'text-emerald-900' },
                { bg: 'bg-amber-100', border: 'border-amber-300', text: 'text-amber-900' },
                { bg: 'bg-rose-100', border: 'border-rose-300', text: 'text-rose-900' }
            ];

            // 3. Generate problems
            for (let i = 0; i < count; i++) {
                const op = ops[Math.floor(Math.random() * ops.length)];
                let num1, num2;

                if (op === '+') {
                    if (useDecimals) {
                        num1 = (getRandomInt(minBase * 10, maxBase * 10) / 10).toFixed(1);
                        num2 = (getRandomInt(minBase * 10, maxBase * 10) / 10).toFixed(1);
                    } else {
                        num1 = getRandomInt(minBase, maxBase).toString();
                        num2 = getRandomInt(minBase, maxBase).toString();
                    }
                } 
                else if (op === '-') {
                    if (useDecimals) {
                        let n1 = getRandomInt(minBase * 10, maxBase * 10);
                        let n2 = getRandomInt(minBase * 10, maxBase * 10);
                        if (n1 < n2) { const temp = n1; n1 = n2; n2 = temp; }
                        num1 = (n1 / 10).toFixed(1);
                        num2 = (n2 / 10).toFixed(1);
                    } else {
                        let n1 = getRandomInt(minBase, maxBase);
                        let n2 = getRandomInt(minBase, maxBase);
                        if (n1 < n2) { const temp = n1; n1 = n2; n2 = temp; }
                        num1 = n1.toString();
                        num2 = n2.toString();
                    }
                } 
                else if (op === '*') {
                    if (useDecimals) {
                        num1 = (getRandomInt(minBase * 10, maxBase * 10) / 10).toFixed(1);
                    } else {
                        num1 = getRandomInt(minBase, maxBase).toString();
                    }
                    num2 = getRandomInt(2, 9).toString();
                } 
                else if (op === '/') {
                    let n2 = getRandomInt(2, 9);
                    num2 = n2.toString();
                    
                    if (useDecimals) {
                        const minMultiplier = Math.ceil((minBase * 10) / n2);
                        const maxMultiplier = Math.floor((maxBase * 10) / n2);
                        let multiplier;
                        if (minMultiplier > maxMultiplier) {
                            multiplier = getRandomInt(10, 90);
                        } else {
                            multiplier = getRandomInt(minMultiplier, maxMultiplier);
                        }
                        num1 = ((multiplier * n2) / 10).toFixed(1);
                    } else {
                        const minMultiplier = Math.ceil(minBase / n2);
                        const maxMultiplier = Math.floor(maxBase / n2);
                        let multiplier;
                        if (minMultiplier > maxMultiplier) {
                            multiplier = getRandomInt(1, 9); 
                        } else {
                            multiplier = getRandomInt(minMultiplier, maxMultiplier);
                        }
                        num1 = (multiplier * n2).toString();
                    }
                }

                // Format for Swedish locale (comma instead of dot)
                num1 = num1.replace('.', ',');
                num2 = num2.replace('.', ',');

                // Get a random color theme
                const theme = cardColors[Math.floor(Math.random() * cardColors.length)];

                // 4. Render the problem card
                const card = document.createElement('div');
                card.className = `problem-card print-break-inside-avoid ${theme.bg} ${theme.border} ${theme.text} rounded-[2rem] shadow-sm border-4 p-8 flex items-center justify-center min-h-[220px] transform transition-transform duration-300 hover:scale-105 hover:shadow-md cursor-default relative overflow-hidden`;

                if (op === '/') {
                    // Division rendered vertically as a fraction: dividend on top, line, divisor below
                    card.innerHTML = `
                        <div class="font-mono text-5xl font-bold text-center flex flex-col items-center w-48 z-10">
                            <div class="tracking-widest">${num1}</div>
                            <div class="border-b-4 border-current w-full mt-2 pb-2"></div>
                            <div class="tracking-widest mt-2">${num2}</div>
                            <div class="opacity-70 mt-4">=</div>
                            <div class="h-8 w-full"></div> <!-- Empty space for student answer -->
                        </div>
                        <div class="absolute -bottom-4 -right-4 text-7xl opacity-5 z-0 font-bold">&divide;</div>
                    `;
                } else {
                    // Addition, Subtraction, and Multiplication rendered vertically
                    const opSymbol = op === '*' ? '&times;' : (op === '-' ? '&minus;' : '+');
                    card.innerHTML = `
                        <div class="font-mono text-5xl font-bold text-right flex flex-col w-48 z-10">
                            <div class="tracking-widest">${num1}</div>
                            <div class="flex justify-between w-full border-b-4 border-current pb-2 mt-2">
                                <span class="opacity-70">${opSymbol}</span>
                                <span class="tracking-widest">${num2}</span>
                            </div>
                            <div class="h-16 w-full"></div> <!-- Empty space for student answer -->
                        </div>
                        <div class="absolute -bottom-4 -left-2 text-8xl opacity-5 z-0 font-bold">${opSymbol}</div>
                    `;
                }

                container.appendChild(card);
            }

            // Close modal if requested
            if (closeModal) {
                closeSettings();
            }
        }

        // Generate initial batch on page load (modal stays open on first load)
        window.onload = () => {
            generateProblems(false);
        };
    </script>
</body>
</html>
